<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulário</title>
    </head>
    <h1>Formulário Completo</h1>
    <form>
        <fieldset>
            <legend>Dados Pessoais</legend>
            <label>Nome: <input type="text"required></label><br><br>
            <label>Sobrenome: <input type="text"required></label><br><br>
            <label>Email: <input type="text"required></label><br><br>
            <label>Telefone: <input type="text"required></label><br><br>
            <label for="birthday">Data de Nascimento: <input type="date"required></label>
        </fieldset>
    </form>
    <form>
        <fieldset>
            <legend>Endereço</legend>
            <label>Rua: <input type="text"required></label><br><br>
            <label>Número: <input type="text"required></label><br><br>
            <label>Cidade: <input type="text"required></label><br><br>
            <label>Estado: <input type="text"required></label><br><br>
            <label>CEP: <input type="text"required></label><br><br>            
        </fieldset>
    </form>
    <form>
        <fieldset>
            <legend>Preferências</legend>
            Cor Favorita:<select name="cores">
                <option>Vermelho</option>
                <option>Laranja</option>
                <option>Amarelo</option>
                <option>Verde</option>
                <option>Azul</option>
                <option>Anil</option>
                <option>Violeta</option>
            </select><br><br>
            Gênero:
            <input type="radio" value="m" name="genero">
            Masculino
            <input type="radio" value="f" name="genero">
            Feminino
            <br><br>
            Interesses:<br>
            <input type="checkbox" value="esportes">
            <label>Esportes</label><br>
            <input type="checkbox" value="musica">
            <label>Música</label><br>
            <input type="checkbox" value="tecno">
            <label>Tecnologia</label>
            <br><br>            
        </fieldset>
    </form>
    <form>
        <fieldset>
            <legend>Upload de Arquivos</legend>
            Escolha um arquivo:
            <input type="file">            
        </fieldset>
    </form>
    <form>
        <fieldset>
            <legend>Informações de Login</legend>
            <label>Nome de Usuário: <input type="text" required></label><br><br>
            <label>Senha: <input type="password" required></label><br><br>
            <label>Confirmar Senha: <input type="password" required></label>            
        </fieldset>
    </form>
    <input type="submit" value="Enviar">
</html>
